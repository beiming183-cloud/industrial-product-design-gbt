<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Industrial Product Design GB/T</title>
  <desc id="desc">A design-first workflow from product intent through native 3D quality gates to GB/T engineering handoff.</desc>
  <defs>
